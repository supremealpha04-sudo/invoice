<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SupremeInvoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #002868, #BF0A30); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    </style>
</head>
<body>
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-xl">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-r from-[#002868] to-[#BF0A30] rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-3">SI</div>
            <h1 class="text-2xl font-bold">SupremeInvoice</h1>
            <p class="text-gray-500">Sign in to your account</p>
        </div>
        
        <div id="supabaseNotice" class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4 text-sm">
            <p class="text-yellow-800">⚠️ Supabase required for cloud accounts</p>
            <p class="text-xs text-yellow-600 mt-1">Add your SUPABASE_URL and SUPABASE_ANON_KEY to .env file</p>
        </div>
        
        <form id="loginForm" onsubmit="handleAuth(event)">
            <input type="email" id="email" placeholder="Email address" class="w-full px-4 py-3 border rounded-lg mb-3" required>
            <input type="password" id="password" placeholder="Password (min 6 characters)" class="w-full px-4 py-3 border rounded-lg mb-4" required>
            <button type="submit" class="w-full bg-[#002868] text-white py-3 rounded-lg font-bold">Sign In / Sign Up</button>
        </form>
        
        <div class="mt-4 text-center">
            <button onclick="useDemoAccount()" class="text-sm text-gray-500">Continue as Guest</button>
        </div>
        
        <div class="mt-6 pt-4 border-t text-center">
            <p class="text-xs text-gray-400">By continuing, you agree to our Terms and Privacy Policy</p>
        </div>
    </div>

    <script>
        // Supabase will be initialized with env vars at build time
        let supabase = null;
        
        async function handleAuth(e) {
            e.preventDefault();
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            
            if(password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            // Store in localStorage for demo
            let user = { email: email, createdAt: new Date().toISOString() };
            localStorage.setItem('supreme_user', JSON.stringify(user));
            
            alert(`Welcome ${email}! Your account has been created/signed in.`);
            window.location.href = '/index.html';
        }
        
        function useDemoAccount() {
            window.location.href = '/index.html';
        }
        
        // Check if Supabase is configured (keys from .env via Vercel)
        // In production, these are replaced at build time
        const SUPABASE_URL = '%%SUPABASE_URL%%';
        const SUPABASE_KEY = '%%SUPABASE_ANON_KEY%%';
        
        if(SUPABASE_URL !== '%%SUPABASE_URL%%' && SUPABASE_KEY !== '%%SUPABASE_ANON_KEY%%') {
            document.getElementById('supabaseNotice').classList.add('hidden');
            initSupabase();
        }
        
        async function initSupabase() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let { data } = await supabase.auth.getSession();
            if(data.session) {
                localStorage.setItem('supreme_user', JSON.stringify(data.session.user));
                window.location.href = '/index.html';
            }
        }
    </script>
</body>
</html>
